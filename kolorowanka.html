<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Witraż – Duch Święty</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f4efe6;
    font-family:Georgia, serif;
    text-align:center;
}

h1{
    color:#4b2e18;
}

.palette{
    margin:20px 0;
}

.color{
    width:28px;
    height:28px;
    display:inline-block;
    margin:4px;
    border-radius:4px;
    cursor:pointer;
    border:2px solid #333;
}

button{
    padding:10px 18px;
    margin:8px;
    background:#5a3a1e;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#3e2714;
}

svg{
    max-width:900px;
    width:100%;
}

.paintable{
    fill:white;
    stroke:#1a1a1a;
    stroke-width:3;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Witrażowa Kolorowanka – Duch Święty</h1>

<div class="palette">
<!-- złota gama -->
<div class="color" style="background:#fffdf5" onclick="setColor('#fffdf5')"></div>
<div class="color" style="background:#f7e6a3" onclick="setColor('#f7e6a3')"></div>
<div class="color" style="background:#f4c542" onclick="setColor('#f4c542')"></div>
<div class="color" style="background:#e0a106" onclick="setColor('#e0a106')"></div>
<!-- czerwienie -->
<div class="color" style="background:#f5b7b1" onclick="setColor('#f5b7b1')"></div>
<div class="color" style="background:#e74c3c" onclick="setColor('#e74c3c')"></div>
<div class="color" style="background:#922b21" onclick="setColor('#922b21')"></div>
<!-- błękity -->
<div class="color" style="background:#d6eaf8" onclick="setColor('#d6eaf8')"></div>
<div class="color" style="background:#5dade2" onclick="setColor('#5dade2')"></div>
<div class="color" style="background:#154360" onclick="setColor('#154360')"></div>
<!-- zielenie -->
<div class="color" style="background:#d5f5e3" onclick="setColor('#d5f5e3')"></div>
<div class="color" style="background:#2ecc71" onclick="setColor('#2ecc71')"></div>
<div class="color" style="background:#196f3d" onclick="setColor('#196f3d')"></div>
<!-- fiolety -->
<div class="color" style="background:#e8daef" onclick="setColor('#e8daef')"></div>
<div class="color" style="background:#9b59b6" onclick="setColor('#9b59b6')"></div>
<div class="color" style="background:#4a235a" onclick="setColor('#4a235a')"></div>
<!-- neutralne -->
<div class="color" style="background:#ffffff" onclick="setColor('#ffffff')"></div>
<div class="color" style="background:#cccccc" onclick="setColor('#cccccc')"></div>
<div class="color" style="background:#000000" onclick="setColor('#000000')"></div>
</div>

<button onclick="clearImage()">Wyczyść obraz</button>
<button onclick="savePNG()">Zapisz jako PNG</button>

<br><br>

<svg id="svgImage" viewBox="0 0 800 800">

<!-- KWADRATOWE TŁO – siatka witrażowa -->
<g>
<!-- 8x8 szkiełek -->
<script type="application/ecmascript"><![CDATA[
for(let i=0;i<8;i++){
 for(let j=0;j<8;j++){
   let rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
   rect.setAttribute("x",i*100);
   rect.setAttribute("y",j*100);
   rect.setAttribute("width",100);
   rect.setAttribute("height",100);
   rect.setAttribute("class","paintable");
   document.currentScript.parentNode.appendChild(rect);
 }
}
]]></script>
</g>

<!-- DUŻE KOŁO -->
<circle class="paintable" cx="400" cy="400" r="300"/>

<!-- RAMKA KOŁA – segmenty -->
<g>
<script type="application/ecmascript"><![CDATA[
for(let i=0;i<24;i++){
 let angle1=(i*15)*Math.PI/180;
 let angle2=((i+1)*15)*Math.PI/180;
 let x1=400+300*Math.cos(angle1);
 let y1=400+300*Math.sin(angle1);
 let x2=400+300*Math.cos(angle2);
 let y2=400+300*Math.sin(angle2);
 let path=document.createElementNS("http://www.w3.org/2000/svg","path");
 path.setAttribute("d",
  `M400,400 L${x1},${y1} A300,300 0 0,1 ${x2},${y2} Z`);
 path.setAttribute("class","paintable");
 document.currentScript.parentNode.appendChild(path);
}
]]></script>
</g>

<!-- WEWNĘTRZNA AUREOLA -->
<circle class="paintable" cx="400" cy="400" r="180"/>

<!-- PROMIENIE TŁA -->
<g>
<script type="application/ecmascript"><![CDATA[
for(let i=0;i<24;i++){
 let angle1=(i*15)*Math.PI/180;
 let angle2=((i+1)*15)*Math.PI/180;
 let x1=400+180*Math.cos(angle1);
 let y1=400+180*Math.sin(angle1);
 let x2=400+180*Math.cos(angle2);
 let y2=400+180*Math.sin(angle2);
 let x3=400+300*Math.cos(angle2);
 let y3=400+300*Math.sin(angle2);
 let x4=400+300*Math.cos(angle1);
 let y4=400+300*Math.sin(angle1);
 let path=document.createElementNS("http://www.w3.org/2000/svg","polygon");
 path.setAttribute("points",
  `${x1},${y1} ${x2},${y2} ${x3},${y3} ${x4},${y4}`);
 path.setAttribute("class","paintable");
 document.currentScript.parentNode.appendChild(path);
}
]]></script>
</g>

<!-- GOŁĘBICA -->

<!-- tułów -->
<ellipse class="paintable" cx="400" cy="430" rx="70" ry="110"/>

<!-- głowa -->
<circle class="paintable" cx="400" cy="350" r="35"/>

<!-- skrzydła – segmentowane -->
<path class="paintable" d="M330 400 Q200 320 160 420 Q250 470 330 450 Z"/>
<path class="paintable" d="M470 400 Q600 320 640 420 Q550 470 470 450 Z"/>

<!-- pióra -->
<path class="paintable" d="M310 450 Q240 390 220 460 Q280 480 310 470 Z"/>
<path class="paintable" d="M490 450 Q560 390 580 460 Q520 480 490 470 Z"/>

<!-- ogon -->
<polygon class="paintable" points="360,520 400,650 440,520"/>
<polygon class="paintable" points="380,520 400,690 420,520"/>

</svg>

<script>
let currentColor="#ffffff";

function setColor(color){
 currentColor=color;
}

document.addEventListener("click",function(e){
 if(e.target.classList.contains("paintable")){
  e.target.style.fill=currentColor;
 }
});

function clearImage(){
 document.querySelectorAll(".paintable").forEach(el=>{
  el.style.fill="white";
 });
}

function savePNG(){
 const svg=document.getElementById("svgImage");
 const serializer=new XMLSerializer();
 const source=serializer.serializeToString(svg);
 const img=new Image();
 const blob=new Blob([source],{type:"image/svg+xml"});
 const url=URL.createObjectURL(blob);

 img.onload=function(){
  const canvas=document.createElement("canvas");
  canvas.width=800;
  canvas.height=800;
  const ctx=canvas.getContext("2d");
  ctx.drawImage(img,0,0);
  const png=canvas.toDataURL("image/png");
  const link=document.createElement("a");
  link.download="witraz_duch_swiety.png";
  link.href=png;
  link.click();
  URL.revokeObjectURL(url);
 };
 img.src=url;
}
</script>

</body>
</html>
